name: Build And Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
            npm_script: dist:linux
            artifact_name: jarvis-installer-linux
            artifact_glob: |
              release/*.AppImage
              release/*.deb
          - os: windows-latest
            label: Windows
            npm_script: dist:win
            artifact_name: jarvis-installer-windows
            artifact_glob: |
              release/*.exe
          - os: macos-latest
            label: macOS
            npm_script: dist:mac
            artifact_name: jarvis-installer-macos
            artifact_glob: |
              release/*.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Export Python for node-gyp
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_ENV -Value "PYTHON=${{ steps.setup-python.outputs.python-path }}"
          Add-Content -Path $env:GITHUB_ENV -Value "npm_config_python=${{ steps.setup-python.outputs.python-path }}"

      - name: Verify Python
        shell: pwsh
        run: |
          python --version
          & "${{ steps.setup-python.outputs.python-path }}" --version

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build platform package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run ${{ matrix.npm_script }}

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: ${{ matrix.artifact_glob }}

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: |
            release-artifacts/**/*.AppImage
            release-artifacts/**/*.deb
            release-artifacts/**/*.exe
            release-artifacts/**/*.dmg
